<!DOCTYPE html>
<html lang="en" data-theme="dark" class="public-document">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Computer Care (Anubhav EduVista)</title>
<link rel="stylesheet" href="css/styles.css?v=20260609f">
<style>
.blog-wrapper { min-height:100vh; background:var(--bg-main); color:var(--text-main); padding-top:80px; }
.pub-nav { position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(10,10,20,0.9); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border); padding:0 24px; height:64px;
  display:flex; align-items:center; justify-content:space-between; }
.pub-nav-brand { display:flex; align-items:center; gap:12px; }
.pub-nav-brand-icon { width:38px; height:38px; background:linear-gradient(135deg,var(--primary),var(--secondary));
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:0.9rem; color:#fff; }
.blog-hero { padding:60px 24px 40px; max-width:900px; margin:0 auto; text-align:center; }
.blog-hero h1 { font-size:2.5rem; font-weight:800;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:12px; }
.blog-hero p { color:var(--text-muted); font-size:1rem; }
.blog-main { max-width:1100px; margin:0 auto; padding:0 24px 80px; display:grid;
  grid-template-columns:1fr 300px; gap:30px; }
.blog-post-card { background:var(--glass-bg); border:1px solid var(--glass-border);
  border-radius:16px; padding:28px; margin-bottom:24px; cursor:pointer; transition:all 0.3s; }
.blog-post-card:hover { border-color:var(--primary); transform:translateY(-2px); }
.blog-post-card.featured { border:1px solid rgba(94,234,212,0.3); background:rgba(4,120,87,0.06); }
.blog-cat-badge { display:inline-block; font-size:0.72rem; font-weight:700; color:var(--primary);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.blog-post-card h2 { font-size:1.3rem; font-weight:700; margin-bottom:10px; line-height:1.4; }
.blog-post-card p { color:var(--text-muted); font-size:0.88rem; line-height:1.7; margin-bottom:14px; }
.blog-post-meta { font-size:0.78rem; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap; }
.blog-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.blog-tag { font-size:0.7rem; background:rgba(94,234,212,0.1); color:var(--primary);
  border-radius:6px; padding:3px 8px; }

/* Full post overlay */
.post-overlay { display:none; position:fixed; inset:0; z-index:200; overflow-y:auto;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); padding:20px; }
.post-overlay.active { display:flex; align-items:flex-start; justify-content:center; }
.post-panel { background:var(--glass-bg-heavy); border:1px solid var(--glass-border);
  border-radius:20px; max-width:820px; width:100%; margin:20px auto;
  padding:40px; position:relative; }
.post-panel-close { position:absolute; top:16px; right:16px; background:var(--glass-bg);
  border:1px solid var(--glass-border); border-radius:50%; width:36px; height:36px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; }
.post-content { font-size:0.95rem; line-height:1.85; white-space:pre-wrap; color:var(--text-main); }

/* Admin blog form */
.blog-admin-panel { background:var(--glass-bg); border:1px solid var(--glass-border);
  border-radius:16px; padding:24px; margin-bottom:20px; }

/* Sidebar */
.blog-sidebar { position:sticky; top:90px; }
.sidebar-widget { background:var(--glass-bg); border:1px solid var(--glass-border);
  border-radius:14px; padding:20px; margin-bottom:20px; }
.sidebar-widget h4 { font-size:0.88rem; font-weight:700; color:var(--primary);
  margin-bottom:14px; text-transform:uppercase; letter-spacing:1px; }
.cat-item { display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--glass-bg-ultra-light); font-size:0.85rem; cursor:pointer; }
.cat-item:hover { color:var(--primary); }
.cat-count { background:var(--glass-bg-heavy); border-radius:999px; padding:2px 8px;
  font-size:0.72rem; font-weight:700; }
</style>
</head>
<body class="blog-wrapper">

<!-- Nav -->
<nav class="pub-nav">
  <div class="pub-nav-brand">
    <div class="pub-nav-brand-icon">CC</div>
    <div>
      <div style="font-weight:800;font-size:0.95rem;color:var(--text-main)">Computer Care Blog</div>
      <div style="font-size:0.7rem;color:var(--text-muted)">Anubhav EduVista</div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <a href="public.html" class="btn btn-sm btn-secondary">🏠 Home</a>
    <a href="index.html" class="btn btn-sm btn-primary">🔐 Login</a>
  </div>
</nav>

<div class="blog-hero">
  <h1>📰 Academy Blog</h1>
  <p>Career tips, course updates, success stories, and insights from Computer Care (Anubhav EduVista)</p>
  <!-- Search -->
  <div style="margin-top:20px;display:flex;gap:8px;max-width:500px;margin-left:auto;margin-right:auto">
    <input id="blogSearch" class="form-control" placeholder="🔍 Search posts..." oninput="filterBlogPosts()">
  </div>
</div>

<!-- Admin Blog Management Panel (only shown when logged in as admin) -->
<div style="max-width:1100px;margin:0 auto;padding:0 24px">
  <div id="blogAdminPanel" style="display:none" class="blog-admin-panel">
    <h4 style="color:var(--primary);margin-bottom:14px">✍️ Write New Blog Post</h4>
    <div class="form-grid" style="grid-template-columns:1fr 1fr">
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Title *</label><input id="blogTitle" class="form-control" placeholder="Post title..."></div>
      <div class="form-group"><label class="form-label">Category</label>
        <select id="blogCategory" class="form-control">
          <option>About Us</option><option>Career Tips</option><option>Success Stories</option>
          <option>Education</option><option>Events</option><option>Tech Tips</option><option>News</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Tags (comma separated)</label><input id="blogTags" class="form-control" placeholder="career, courses, tips"></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Excerpt (Short Summary)</label><textarea id="blogExcerpt" class="form-control" rows="2" placeholder="Brief summary shown in the post list..."></textarea></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Full Content *</label><textarea id="blogContent" class="form-control" rows="10" placeholder="Write your full blog post content here...&#10;You can use multiple paragraphs."></textarea></div>
      <div class="form-group"><label class="form-label">Featured Post?</label><select id="blogFeatured" class="form-control"><option value="false">No</option><option value="true">Yes — Show on Homepage</option></select></div>
    </div>
    <button class="btn btn-primary" onclick="publishBlogPost()">🚀 Publish Post</button>
  </div>
</div>

<!-- Blog Main Content -->
<div class="blog-main">
  <div>
    <!-- Category filter pills -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px" id="catFilters">
      <button class="btn btn-sm active cat-filter-btn" data-cat="all" onclick="setCatFilter('all',this)">All Posts</button>
    </div>

    <div id="blogPostsList">
      <div class="empty-state"><div class="loader"></div></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="blog-sidebar">
    <div class="sidebar-widget">
      <h4>📂 Categories</h4>
      <div id="catList"></div>
    </div>
    <div class="sidebar-widget">
      <h4>🔥 Featured Posts</h4>
      <div id="featuredList"></div>
    </div>
    <div class="sidebar-widget">
      <h4>🏫 About the Academy</h4>
      <div style="font-size:0.83rem;color:var(--text-muted);line-height:1.7" id="sidebarAbout"></div>
      <div style="margin-top:12px">
        <a href="public.html" class="btn btn-sm btn-primary w-full" style="text-align:center">Visit Website</a>
      </div>
    </div>
    <div class="sidebar-widget">
      <h4>📢 Latest Notice</h4>
      <div id="sidebarNotif"></div>
    </div>
  </div>
</div>

<!-- Full Post Overlay -->
<div class="post-overlay" id="postOverlay">
  <div class="post-panel" id="postPanel">
    <div class="post-panel-close" onclick="closePost()">✕</div>
    <div id="postPanelContent"></div>
  </div>
</div>

<script src="js/data.js?v=20260609f"></script>
<script src="js/auth.js?v=20260609f"></script>
<script>
let allPosts = [];
let catFilter = 'all';

document.addEventListener('DOMContentLoaded', ()=>{
  DB.init();
  allPosts = DB.getBlogPosts();

  // Check if admin is logged in
  const session = DB.getSession();
  const adminPanel = document.getElementById('blogAdminPanel');
  if(adminPanel && session && session.role === 'admin') adminPanel.style.display = '';

  renderPosts();
  renderSidebar();

  // Handle URL hash
  if(window.location.hash) {
    const id = window.location.hash.slice(1);
    const post = allPosts.find(p=>p.id===id);
    if(post) openPost(post);
  }
});

function renderPosts() {
  const search = (document.getElementById('blogSearch').value||'').toLowerCase();
  let posts = allPosts;
  if(catFilter !== 'all') posts = posts.filter(p=>p.category===catFilter);
  if(search) posts = posts.filter(p=>
    p.title.toLowerCase().includes(search) ||
    (p.excerpt||'').toLowerCase().includes(search) ||
    p.content.toLowerCase().includes(search)
  );

  const el = document.getElementById('blogPostsList');
  if(!el) return;
  if(!posts.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📰</div><p>No posts found</p></div>';
    return;
  }

  el.innerHTML = posts.map(p=>`
    <div class="blog-post-card ${p.featured?'featured':''}" onclick="openPost(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      ${p.featured?'<div style="font-size:0.72rem;color:var(--warning);font-weight:700;margin-bottom:8px">⭐ FEATURED</div>':''}
      <div class="blog-cat-badge">${p.category}</div>
      <h2>${p.title}</h2>
      <p>${p.excerpt||p.content.slice(0,180)+'...'}</p>
      <div class="blog-post-meta">
        <span>✍️ ${p.author}</span>
        <span>📅 ${p.publishedAt}</span>
        <span>👁 ${p.views||0} views</span>
      </div>
      ${p.tags&&p.tags.length?`<div class="blog-tags">${p.tags.map(t=>`<span class="blog-tag">#${t}</span>`).join('')}</div>`:''}
    </div>`).join('');

  // Update category buttons
  const cats = [...new Set(allPosts.map(p=>p.category))];
  const filtersEl = document.getElementById('catFilters');
  if(filtersEl) {
    filtersEl.innerHTML = `<button class="btn btn-sm ${catFilter==='all'?'active':'btn-secondary'} cat-filter-btn" data-cat="all" onclick="setCatFilter('all',this)">All (${allPosts.length})</button>` +
      cats.map(c=>`<button class="btn btn-sm ${catFilter===c?'active':'btn-secondary'} cat-filter-btn" data-cat="${c}" onclick="setCatFilter('${c}',this)">${c} (${allPosts.filter(p=>p.category===c).length})</button>`).join('');
  }
}

function renderSidebar() {
  const settings = DB.getSettings();
  const sidebarAbout = document.getElementById('sidebarAbout');
  if(sidebarAbout) sidebarAbout.innerHTML = `<strong>${settings.academyName}</strong><br>${settings.address}<br>📞 ${settings.mobile}`;

  const cats = [...new Set(allPosts.map(p=>p.category))];
  const catEl = document.getElementById('catList');
  if(catEl) catEl.innerHTML = cats.map(c=>
    `<div class="cat-item" onclick="setCatFilter('${c}',null)"><span>${c}</span><span class="cat-count">${allPosts.filter(p=>p.category===c).length}</span></div>`
  ).join('');

  const featured = allPosts.filter(p=>p.featured).slice(0,3);
  const featEl = document.getElementById('featuredList');
  if(featEl) featEl.innerHTML = featured.map(p=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--glass-bg-ultra-light);cursor:pointer" onclick="openPost(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div style="font-size:0.82rem;font-weight:600;line-height:1.4;margin-bottom:4px">${p.title}</div>
      <div style="font-size:0.72rem;color:var(--text-muted)">📅 ${p.publishedAt}</div>
    </div>`).join('') || '<div style="font-size:0.83rem;color:var(--text-muted)">No featured posts yet</div>';

  const notifs = DB.getNotifications().filter(n=>n.target==='all').slice(0,2);
  const notifEl = document.getElementById('sidebarNotif');
  if(notifEl) notifEl.innerHTML = notifs.map(n=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--glass-bg-ultra-light)">
      <div style="font-size:0.82rem;font-weight:600">${n.icon||'📌'} ${n.title}</div>
      <div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px">${n.message.slice(0,80)}...</div>
    </div>`).join('') || '<div style="font-size:0.83rem;color:var(--text-muted)">No announcements</div>';
}

function openPost(post) {
  // Increment views
  const idx = allPosts.findIndex(p=>p.id===post.id);
  if(idx>=0) {
    allPosts[idx].views = (allPosts[idx].views||0) + 1;
    DB.updateBlogPost(post.id, { views: allPosts[idx].views });
  }

  const session = DB.getSession();
  const isAdmin = session && session.role === 'admin';

  const content = document.getElementById('postPanelContent');
  if(!content) return;
  content.innerHTML = `
    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${post.category}</div>
    <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:14px;line-height:1.3">${post.title}</h1>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:0.8rem;color:var(--text-muted);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--glass-border)">
      <span>✍️ ${post.author} (${post.authorRole||''})</span>
      <span>📅 ${post.publishedAt}</span>
      <span>👁 ${post.views||0} views</span>
      ${post.tags&&post.tags.length?`<span>🏷️ ${post.tags.join(', ')}</span>`:''}
    </div>
    <div class="post-content">${post.content}</div>
    ${post.tags&&post.tags.length?`<div style="margin-top:20px;display:flex;gap:6px;flex-wrap:wrap">${post.tags.map(t=>`<span style="font-size:0.75rem;background:rgba(94,234,212,0.1);color:var(--primary);border-radius:6px;padding:4px 10px">#${t}</span>`).join('')}</div>`:''}
    ${isAdmin?`<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--glass-border)"><button class="btn btn-sm btn-danger" onclick="deleteBlogPost('${post.id}')">🗑 Delete Post</button></div>`:''}`;

  document.getElementById('postOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePost() {
  document.getElementById('postOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function setCatFilter(cat, btn) {
  catFilter = cat;
  document.querySelectorAll('.cat-filter-btn').forEach(b=>{b.classList.remove('active');b.classList.add('btn-secondary');});
  if(btn){btn.classList.add('active');btn.classList.remove('btn-secondary');}
  renderPosts();
}

function filterBlogPosts() { renderPosts(); }

function publishBlogPost() {
  const title   = document.getElementById('blogTitle').value.trim();
  const content = document.getElementById('blogContent').value.trim();
  if(!title||!content){alert('Title and content required');return;}
  const session = DB.getSession();
  DB.addBlogPost({
    title,
    excerpt: document.getElementById('blogExcerpt').value.trim(),
    content,
    category: document.getElementById('blogCategory').value,
    tags: document.getElementById('blogTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    featured: document.getElementById('blogFeatured').value === 'true',
    author: session ? session.name : 'Admin',
    authorRole: 'Principal',
  });
  allPosts = DB.getBlogPosts();
  renderPosts();
  renderSidebar();
  ['blogTitle','blogExcerpt','blogContent','blogTags'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  alert('Blog post published!');
}

function deleteBlogPost(id) {
  if(!confirm('Delete this post?')) return;
  DB.deleteBlogPost(id);
  allPosts = DB.getBlogPosts();
  closePost();
  renderPosts();
  renderSidebar();
}

document.getElementById('postOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('postOverlay')) closePost();
});
</script>
</body>
</html>
